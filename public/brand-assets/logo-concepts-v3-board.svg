    <text x="0" y="42" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5F5D58">Simple geometry, scalable strokes, black-only friendly.</text>
    <rect x="0" y="86" width="86" height="34" fill="#111111"/>
    <rect x="96" y="86" width="86" height="34" fill="#64635F"/>
    <rect x="192" y="86" width="86" height="34" fill="#BDA987"/>
    <rect x="288" y="86" width="86" height="34" fill="#C9A66B"/>
