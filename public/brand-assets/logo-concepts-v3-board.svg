<svg width="1800" height="1050" viewBox="0 0 1800 1050" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Three original logo concepts</title>
  <desc id="desc">A clean presentation board with three original vector logo directions: architectural order, origin axis, and light portal.</desc>
  <rect width="1800" height="1050" fill="#F7F6F2"/>
  <path d="M600 80V970M1200 80V970" stroke="#D9D7D0" stroke-width="2"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#111111">
    <text x="90" y="96" font-size="28" font-weight="700" letter-spacing="4">CONCEPT A</text>
    <text x="690" y="96" font-size="28" font-weight="700" letter-spacing="4">CONCEPT B</text>
    <text x="1290" y="96" font-size="28" font-weight="700" letter-spacing="4">CONCEPT C</text>
    <text x="90" y="132" font-size="19" letter-spacing="2" fill="#6C6962">ARCHITECTURAL ORDER</text>
    <text x="690" y="132" font-size="19" letter-spacing="2" fill="#6C6962">ORIGIN AXIS</text>
    <text x="1290" y="132" font-size="19" letter-spacing="2" fill="#6C6962">LIGHT PORTAL</text>
  </g>

  <g transform="translate(90 185)">
    <rect width="420" height="420" fill="#F7F6F2"/>
