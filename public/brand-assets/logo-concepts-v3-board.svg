    <circle cx="210" cy="210" r="32" fill="#C9A66B" opacity=".1"/>
  </g>

  <g transform="translate(1290 185)">
    <rect width="420" height="420" fill="#F7F6F2"/>
    <path d="M95 55H298V330H246V108H148V330H95V55Z" fill="#111111"/>
    <path d="M246 108H298V330L246 280V108Z" fill="#2C2C2A"/>
    <path d="M148 330H246L330 380H208L148 330Z" fill="#BDA987" opacity=".42"/>
    <path d="M246 108V280" stroke="#C9A66B" stroke-width="7" stroke-linecap="square"/>
    <path d="M246 280L330 380" stroke="#C9A66B" stroke-width="5" opacity=".9"/>
