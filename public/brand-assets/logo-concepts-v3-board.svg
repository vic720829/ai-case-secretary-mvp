      <path d="M210 292V238" stroke="#C9A66B" stroke-width="5"/>
    </g>
    <circle cx="210" cy="292" r="11" fill="#C9A66B"/>
    <circle cx="210" cy="292" r="22" fill="#C9A66B" opacity=".12"/>
    <path d="M104 322H316" stroke="#111111" stroke-width="4"/>
  </g>

  <g transform="translate(690 185)">
    <rect width="420" height="420" fill="#F7F6F2"/>
    <g stroke-linecap="square" stroke-linejoin="miter">
      <path d="M210 56V364" stroke="#111111" stroke-width="11"/>
      <path d="M56 210H364" stroke="#111111" stroke-width="11"/>
      <path d="M258 210V124" stroke="#111111" stroke-width="9"/>
      <path d="M258 164H330V292" stroke="#111111" stroke-width="9"/>
      <path d="M162 210V292" stroke="#64635F" stroke-width="7"/>
